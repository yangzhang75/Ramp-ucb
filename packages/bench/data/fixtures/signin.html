<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — Mailbox</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f4f6f8; color: #111111; margin: 0; }
      .card { max-width: 360px; margin: 64px auto; background: #ffffff; padding: 28px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08); }
      h1 { font-size: 1.4rem; margin-top: 0; }
      label { display: block; font-weight: 600; margin-top: 12px; }
      input { width: 100%; box-sizing: border-box; padding: 10px 12px; margin: 8px 0; border: 1px solid #b0b0b0; border-radius: 8px; font-size: 1rem; }
      .submit { width: 100%; background: #2563eb; color: #ffffff; border: none; border-radius: 8px; padding: 11px; font-size: 1rem; cursor: pointer; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign in to Mailbox</h1>
      <form>
        <input id="email" type="email" placeholder="Email address" />
        <input id="password" type="password" placeholder="Password" />
        <button class="submit" type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
