<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Tide Tables — Coastal Journal</title>
    <style>
      body { font-family: Georgia, serif; margin: 0; color: #111111; background: #ffffff; }
      header { background: #14323b; color: #ffffff; padding: 16px 24px; }
      main { max-width: 680px; margin: 0 auto; padding: 24px; }
      figure { margin: 24px 0; }
      figure img { width: 100%; max-width: 420px; height: auto; border-radius: 8px; }
      /* Pale gray caption on white — ~2.5:1, fails WCAG AA. */
      .caption { color: #c0c0c0; font-size: 0.9rem; font-style: italic; }
    </style>
  </head>
  <body>
    <header><strong>Coastal Journal</strong></header>
    <main>
      <h1>The Tide Tables</h1>
      <h3>Why tides matter to coastal walkers</h3>
      <p>Tides shape every shoreline route. Knowing the schedule keeps a walk safe and the views worth the effort.</p>
      <figure>
        <img id="lighthouse" src="lighthouse-dusk.jpg" width="420" height="280" />
        <figcaption class="caption">A lighthouse at dusk on the northern cape.</figcaption>
      </figure>
      <h3>Reading the chart</h3>
      <p>Each row lists a high and low water time. Plan to cross sand flats only on a falling tide.</p>
    </main>
  </body>
</html>
