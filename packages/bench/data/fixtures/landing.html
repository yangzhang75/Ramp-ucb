<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brew better coffee — Kettle</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; color: #111111; background: #ffffff; }
      header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; }
      header nav a { color: #1a1a1a; text-decoration: none; margin-left: 16px; }
      .hero { text-align: center; padding: 48px 24px; background: #ffffff; }
      .hero img { max-width: 360px; width: 100%; height: auto; }
      .hero h1 { font-size: 2.2rem; margin-bottom: 8px; }
      /* Real low-contrast: #9e9e9e on white = 2.68:1, fails AA. */
      .subhead { color: #9e9e9e; font-size: 1.1rem; }
      .cta { background: #b45309; color: #ffffff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 1rem; cursor: pointer; }
      .features { display: flex; gap: 24px; max-width: 900px; margin: 40px auto; padding: 0 24px; flex-wrap: wrap; }
      .feature { flex: 1; min-width: 220px; }
      .feature img { width: 40px; height: 40px; }
      footer { background: #1c1917; color: #ffffff; padding: 28px; margin-top: 40px; }
      .social { background: transparent; border: none; cursor: pointer; padding: 6px; }
      .social svg { width: 22px; height: 22px; fill: #ffffff; display: block; }
      .newsletter input { padding: 9px 12px; border: 1px solid #555; border-radius: 8px; font-size: 1rem; }
      .newsletter button { padding: 9px 16px; border: none; border-radius: 8px; background: #b45309; color: #fff; cursor: pointer; }
      /* Decoy: #6b6b6b on white = 5.33:1, PASSES AA (footer text is on dark, fine anyway). */
      .partners p { color: #6b6b6b; }
    </style>
  </head>
  <body>
    <header>
      <strong>Kettle</strong>
      <nav aria-label="Primary">
        <a href="#features">Features</a>
        <a href="#pricing">Pricing</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <!-- Real violation: hero illustration has no alt. -->
        <img id="hero-art" src="hero-pourover.png" width="360" height="240" />
        <h1>Brew better coffee at home</h1>
        <!-- Real violation: low-contrast subheading. -->
        <p class="subhead" id="hero-sub">Guided recipes that adapt to your beans and your taste.</p>
        <button class="cta">Start brewing</button>
      </section>

      <section class="features" id="features">
        <div class="feature">
          <!-- Decoy: decorative feature icon, correctly hidden. -->
          <img src="icons/timer.svg" alt="" />
          <h2>Smart timers</h2>
          <p>Step-by-step pour timing tuned to each recipe.</p>
        </div>
        <div class="feature">
          <img src="icons/scale.svg" alt="" />
          <h2>Ratio calculator</h2>
          <p>Dial in your coffee-to-water ratio instantly.</p>
        </div>
      </section>

      <section class="partners" style="background:#ffffff; max-width:900px; margin:0 auto; padding:0 24px;">
        <!-- Decoy: muted-but-passing text on white. -->
        <p>Loved by home baristas in 40+ countries.</p>
      </section>
    </main>
    <footer>
      <div class="newsletter">
        <h2>Get a weekly recipe</h2>
        <!-- Real violation: newsletter email input has placeholder but no label. -->
        <input id="newsletter-email" type="email" placeholder="you@example.com" />
        <button type="submit">Subscribe</button>
      </div>
      <p style="margin-top:16px;">
        <!-- Real violation: social icon button has no accessible name. -->
        <button class="social" id="social-x">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4l16 16M20 4L4 20" /></svg>
        </button>
        <!-- Decoy: social button WITH a name. -->
        <button class="social" id="social-ig" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="4" fill="none" stroke="#fff" stroke-width="2" /></svg>
        </button>
      </p>
    </footer>
  </body>
</html>
