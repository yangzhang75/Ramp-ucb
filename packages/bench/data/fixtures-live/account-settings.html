<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account settings — Northwind</title>
    <link rel="stylesheet" href="account-settings.css" />
  </head>
  <body>
<header><strong>Northwind · Settings</strong></header>
<main>
  <h1>Account settings</h1>
  <p class="meta-muted" id="g-c1">Last signed in 3 days ago from San Francisco.</p>
  <div class="card">
    <div class="field">
      <input id="g-m1" type="text" value="Ada Lovelace" />
    </div>
    <p class="field-hint" id="g-c2">Your display name is shown on shared documents.</p>
  </div>
  <div class="card">
    <label for="email">Email</label>
    <input id="email" type="email" value="ada@northwind.io" />
    <p class="section-note">We send a confirmation link to this address.</p>
  </div>
</main>
  </body>
</html>
