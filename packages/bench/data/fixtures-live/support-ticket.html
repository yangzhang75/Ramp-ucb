<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New ticket — Northwind Support</title>
    <link rel="stylesheet" href="support-ticket.css" />
  </head>
  <body>
<header><strong>Northwind Support</strong></header>
<main>
  <h1>Open a ticket</h1>
  <button class="icon-btn" id="g-m2"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  <p class="timestamp" id="g-c1">Draft saved 2 minutes ago.</p>
  <form>
    <input id="g-m1" type="text" placeholder="Subject" />
    <label for="body">Description</label>
    <input id="body" type="text" />
    <p class="helper">Include steps to reproduce if you can.</p>
  </form>
</main>
  </body>
</html>
